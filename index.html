<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>LSC Rastreador Pro</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    * {
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #07111f;
      color: #f8fafc;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(circle at top, #164e63, #020617 55%);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, .96);
      border: 1px solid #334155;
      border-radius: 24px;
      padding: 34px;
      box-shadow: 0 25px 70px rgba(0,0,0,.55);
    }

    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .logo {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
    }

    .brand h1 {
      margin: 0;
      color: #e0f2fe;
      font-size: 31px;
      letter-spacing: 1px;
    }

    .brand p {
      margin: 8px 0 0;
      color: #94a3b8;
      font-size: 14px;
    }

    label {
      font-size: 14px;
      color: #cbd5e1;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: #fff;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus, select:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,.12);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-secondary {
      background: #334155;
      color: white;
    }

    .btn-green {
      background: #22c55e !important;
      color: white;
    }

    .btn-small {
      padding: 8px 10px;
      font-size: 12px;
    }

    .error {
      color: #f87171;
      margin-top: 12px;
      text-align: center;
    }

    .app {
      display: none;
      min-height: 100vh;
    }

    header {
      min-height: 72px;
      background: rgba(2, 6, 23, .94);
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    header h2 {
      margin: 0;
      color: #7dd3fc;
    }

    .layout {
      display: grid;
      grid-template-columns: 292px 1fr;
      min-height: calc(100vh - 72px);
    }

    aside {
      background: #0f172a;
      padding: 20px;
      border-right: 1px solid #1e293b;
    }

    aside button {
      width: 100%;
      margin-bottom: 10px;
      text-align: left;
      background: #1e293b;
      color: white;
    }

    aside button:hover {
      background: #334155;
    }

    .side-title {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      margin: 14px 0 10px;
    }

    main {
      padding: 24px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .search {
      max-width: 360px;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .card {
      background: linear-gradient(180deg, #111827, #0f172a);
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,.22);
    }

    .card h3 {
      margin: 0 0 12px;
      color: #7dd3fc;
    }

    .metric h1 {
      font-size: 38px;
      margin: 8px 0;
    }

    .metric p {
      margin: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #334155;
      color: #cbd5e1;
      font-size: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #111827;
      border-radius: 14px;
      overflow: hidden;
    }

    th, td {
      border-bottom: 1px solid #334155;
      padding: 12px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #1e293b;
      color: #93c5fd;
    }

    .status-on {
      color: #22c55e;
      font-weight: bold;
    }

    .status-off {
      color: #ef4444;
      font-weight: bold;
    }

    #map {
      width: 100%;
      height: 480px;
      border-radius: 18px;
      border: 1px solid #334155;
      overflow: hidden;
    }

    .vehicle-card {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .vehicle-card h4 {
      margin: 0 0 8px;
      color: #facc15;
    }

    .muted {
      color: #94a3b8;
      font-size: 13px;
    }

    .alert-box {
      background: #082f49;
      border: 1px solid #0ea5e9;
      padding: 13px;
      border-radius: 14px;
      margin-bottom: 15px;
      color: #e0f2fe;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    @media(max-width: 850px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid #1e293b;
      }

      header {
        flex-direction: column;
        gap: 8px;
      }

      .vehicle-card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="brand">
        <div class="logo">📡</div>
        <h1>LSC RASTREADOR</h1>
        <p>Central inteligente de monitoramento veicular</p>
      </div>

      <label>Usuário</label>
      <input id="loginUser" placeholder="Digite seu usuário">

      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="Digite sua senha">

      <button class="btn-primary" onclick="login()">Acessar Sistema</button>

      <div id="loginError" class="error"></div>

      <p class="muted" style="text-align:center;margin-top:18px">
        Login inicial: admin / admin
      </p>
    </div>
  </section>

  <section id="app" class="app">
    <header>
      <div>
        <h2>📡 LSC RASTREADOR</h2>
        <span class="muted">Painel operacional de rastreamento</span>
      </div>

      <div>
        <span id="loggedUser"></span>
        <button class="btn-danger btn-small" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="layout">
      <aside id="menu"></aside>

      <main>
        <section id="dashboard"></section>
      </main>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    let currentUser = null;
    let map = null;
    let markers = [];
    let watchId = null;
    let searchTerm = "";

    function getData() {
      const data = localStorage.getItem("lsc_rastreador_data");

      if (data) {
        return JSON.parse(data);
      }

      const initialData = {
        users: [
          {
            id: 1,
            name: "Administrador",
            username: "admin",
            password: "admin",
            role: "admin"
          }
        ],
        vehicles: [
          {
            id: 1,
            ownerId: null,
            plate: "ABC-1234",
            model: "Hilux",
            imei: "869999999999999",
            lat: -8.7619,
            lng: -63.9039,
            speed: 42,
            status: "online",
            updatedAt: new Date().toLocaleString("pt-BR")
          }
        ]
      };

      localStorage.setItem("lsc_rastreador_data", JSON.stringify(initialData));
      return initialData;
    }

    function saveData(data) {
      localStorage.setItem("lsc_rastreador_data", JSON.stringify(data));
    }

    function login() {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value.trim();
      const error = document.getElementById("loginError");

      const data = getData();

      const user = data.users.find(u =>
        u.username === username && u.password === password
      );

      if (!user) {
        error.innerText = "Usuário ou senha inválidos.";
        return;
      }

      currentUser = user;

      localStorage.setItem("lsc_current_user", JSON.stringify(user));

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("app").style.display = "block";

      document.getElementById("loggedUser").innerText =
        `${user.name} | ${user.role.toUpperCase()}`;

      renderMenu();
      renderDashboard();
    }

    function logout() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }

      localStorage.removeItem("lsc_current_user");
      location.reload();
    }
        function renderMenu() {
      const menu = document.getElementById("menu");

      if (currentUser.role === "admin") {
        menu.innerHTML = `
          <div class="side-title">Navegação</div>
          <button onclick="renderDashboard()">📍 Mapa Geral</button>
          <button class="btn-green" onclick="rastrearMeuCelular()">📱 Rastrear Meu Celular</button>
          <button onclick="pararRastreamentoCelular()">🛑 Parar Rastreamento</button>

          <div class="side-title">Administração</div>
          <button onclick="renderUsers()">👤 Gerenciar Usuários</button>
          <button onclick="renderVehicles()">🚗 Gerenciar Veículos</button>
          <button onclick="limparTeste()">🧹 Limpar Testes</button>
        `;
      } else {
        menu.innerHTML = `
          <div class="side-title">Cliente</div>
          <button onclick="renderDashboard()">📍 Meus Veículos</button>
          <button class="btn-green" onclick="rastrearMeuCelular()">📱 Rastrear Meu Celular</button>
          <button onclick="pararRastreamentoCelular()">🛑 Parar Rastreamento</button>
        `;
      }
    }

    function getVehiclesByAccess() {
      const data = getData();

      let vehicles = currentUser.role === "admin"
        ? data.vehicles
        : data.vehicles.filter(v => v.ownerId === currentUser.id);

      if (searchTerm) {
        vehicles = vehicles.filter(v =>
          (v.plate + v.model + v.imei)
            .toLowerCase()
            .includes(searchTerm.toLowerCase())
        );
      }

      return vehicles;
    }

    function renderDashboard() {
      const vehicles = getVehiclesByAccess();
      const dashboard = document.getElementById("dashboard");

      const online = vehicles.filter(v => v.status === "online").length;
      const offline = vehicles.filter(v => v.status === "offline").length;
      const averageSpeed = vehicles.length
        ? Math.round(vehicles.reduce((total, v) => total + (v.speed || 0), 0) / vehicles.length)
        : 0;

      dashboard.innerHTML = `
        <div class="topbar">
          <div>
            <h1 style="margin:0">Dashboard</h1>
            <span class="muted">Monitoramento em tempo real e controle de frota</span>
          </div>

          <input
            class="search"
            id="searchInput"
            placeholder="Buscar placa, modelo ou IMEI"
            value="${searchTerm}"
            oninput="searchTerm=this.value;renderDashboard()"
          >
        </div>

        <div class="alert-box">
          Para testar com celular real, abra este site no celular, faça login e clique em
          <b>📱 Rastrear Meu Celular</b>. O navegador vai pedir permissão de localização.
        </div>

        <div class="grid">
          <div class="card metric">
            <span class="pill">🚗 Frota</span>
            <h1>${vehicles.length}</h1>
            <p class="muted">Veículos neste acesso</p>
          </div>

          <div class="card metric">
            <span class="pill">🟢 Online</span>
            <h1>${online}</h1>
            <p class="muted">Transmitindo localização</p>
          </div>

          <div class="card metric">
            <span class="pill">🔴 Offline</span>
            <h1>${offline}</h1>
            <p class="muted">Sem sinal no momento</p>
          </div>

          <div class="card metric">
            <span class="pill">⚡ Velocidade média</span>
            <h1>${averageSpeed}</h1>
            <p class="muted">km/h</p>
          </div>
        </div>

        <div class="card">
          <h3>Mapa de Rastreamento</h3>
          <div id="map"></div>
        </div>

        <div class="card">
          <h3>Veículos Monitorados</h3>
          <div id="vehicleList"></div>
        </div>
      `;

      renderMap(vehicles);
      renderVehicleList(vehicles);
    }

    function renderMap(vehicles) {
      setTimeout(() => {
        if (map) {
          map.remove();
        }

        map = L.map("map").setView([-8.7619, -63.9039], 12);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap"
        }).addTo(map);

        markers = [];

        vehicles.forEach(vehicle => {
          const marker = L.marker([vehicle.lat, vehicle.lng]).addTo(map);

          marker.bindPopup(`
            <b>${vehicle.plate}</b><br>
            Modelo: ${vehicle.model}<br>
            Velocidade: ${vehicle.speed} km/h<br>
            Status: ${vehicle.status}<br>
            Atualizado: ${vehicle.updatedAt}
          `);

          markers.push(marker);
        });

        if (vehicles.length > 0) {
          const group = new L.featureGroup(markers);
          map.fitBounds(group.getBounds().pad(0.2));
        }
      }, 100);
    }

    function centerVehicle(id) {
      const data = getData();
      const vehicle = data.vehicles.find(v => v.id === id);

      if (!vehicle) return;

      renderDashboard();

      setTimeout(() => {
        if (map) {
          map.setView([vehicle.lat, vehicle.lng], 17);
        }
      }, 250);
    }

    function renderVehicleList(vehicles) {
      const list = document.getElementById("vehicleList");

      if (vehicles.length === 0) {
        list.innerHTML = `<p class="muted">Nenhum veículo encontrado.</p>`;
        return;
      }

      list.innerHTML = vehicles.map(v => `
        <div class="vehicle-card">
          <div>
            <h4>${v.plate} - ${v.model}</h4>
            <p>IMEI: ${v.imei}</p>
            <p>Velocidade: ${v.speed} km/h</p>
            <p>Latitude: ${v.lat} | Longitude: ${v.lng}</p>
            <p>Status:
              <span class="${v.status === "online" ? "status-on" : "status-off"}">
                ${v.status.toUpperCase()}
              </span>
            </p>
            <p class="muted">Última atualização: ${v.updatedAt}</p>
          </div>

          <div class="actions">
            <button class="btn-secondary btn-small" onclick="centerVehicle(${v.id})">
              Centralizar
            </button>
          </div>
        </div>
      `).join("");
    }

    function renderUsers() {
      const data = getData();
      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="card">
          <h3>Criar Novo Usuário</h3>

          <label>Nome do Cliente</label>
          <input id="newName" placeholder="Ex: João da Silva">

          <label>Usuário de Login</label>
          <input id="newUsername" placeholder="Ex: joao">

          <label>Senha</label>
          <input id="newPassword" placeholder="Ex: 123456">

          <button class="btn-primary" onclick="createUser()">Criar Usuário</button>
        </div>

        <div class="card">
          <h3>Usuários Cadastrados</h3>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Usuário</th>
                  <th>Perfil</th>
                  <th>Ação</th>
                </tr>
              </thead>

              <tbody>
                ${data.users.map(user => `
                  <tr>
                    <td>${user.name}</td>
                    <td>${user.username}</td>
                    <td>${user.role}</td>
                    <td>
                      ${user.role !== "admin"
                        ? `<button class="btn-danger btn-small" onclick="deleteUser(${user.id})">Excluir</button>`
                        : `Administrador`
                      }
                    </td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function createUser() {
      const name = document.getElementById("newName").value.trim();
      const username = document.getElementById("newUsername").value.trim();
      const password = document.getElementById("newPassword").value.trim();

      if (!name || !username || !password) {
        alert("Preencha todos os campos.");
        return;
      }

      const data = getData();

      if (data.users.some(u => u.username === username)) {
        alert("Esse usuário já existe.");
        return;
      }

      data.users.push({
        id: Date.now(),
        name,
        username,
        password,
        role: "client"
      });

      saveData(data);
      renderUsers();
    }

    function deleteUser(id) {
      if (!confirm("Deseja excluir este usuário?")) return;

      const data = getData();

      data.users = data.users.filter(u => u.id !== id);

      data.vehicles = data.vehicles.map(v => {
        if (v.ownerId === id) {
          v.ownerId = null;
        }

        return v;
      });

      saveData(data);
      renderUsers();
    }

    function renderVehicles() {
      const data = getData();
      const users = data.users.filter(u => u.role === "client");
      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="card">
          <h3>Cadastrar Veículo</h3>

          <label>Cliente Proprietário</label>
          <select id="vehicleOwner">
            <option value="">Selecione um cliente</option>
            ${users.map(u => `<option value="${u.id}">${u.name} - ${u.username}</option>`).join("")}
          </select>

          <label>Placa</label>
          <input id="vehiclePlate" placeholder="Ex: NCA-1234">

          <label>Modelo</label>
          <input id="vehicleModel" placeholder="Ex: Corolla, Hilux, Fazer 250">

          <label>IMEI do Rastreador</label>
          <input id="vehicleImei" placeholder="Ex: 869999999999999">

          <label>Latitude</label>
          <input id="vehicleLat" placeholder="Ex: -8.7619">

          <label>Longitude</label>
          <input id="vehicleLng" placeholder="Ex: -63.9039">

          <label>Status</label>
          <select id="vehicleStatus">
            <option value="online">Online</option>
            <option value="offline">Offline</option>
          </select>

          <button class="btn-primary" onclick="createVehicle()">Cadastrar Veículo</button>
        </div>

        <div class="card">
          <h3>Veículos Cadastrados</h3>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Placa</th>
                  <th>Modelo</th>
                  <th>Cliente</th>
                  <th>Status</th>
                  <th>Localização</th>
                  <th>Ação</th>
                </tr>
              </thead>

              <tbody>
                ${data.vehicles.map(v => {
                  const owner = data.users.find(u => u.id === v.ownerId);

                  return `
                    <tr>
                      <td>${v.plate}</td>
                      <td>${v.model}</td>
                      <td>${owner ? owner.name : "Sem cliente"}</td>
                      <td>
                        <span class="${v.status === "online" ? "status-on" : "status-off"}">
                          ${v.status}
                        </span>
                      </td>
                      <td>${v.lat}, ${v.lng}</td>
                      <td>
                        <button class="btn-secondary btn-small" onclick="simulateVehicle(${v.id})">
                          Simular
                        </button>
                        <button class="btn-danger btn-small" onclick="deleteVehicle(${v.id})">
                          Excluir
                        </button>
                      </td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function createVehicle() {
      const ownerId = Number(document.getElementById("vehicleOwner").value);
      const plate = document.getElementById("vehiclePlate").value.trim().toUpperCase();
      const model = document.getElementById("vehicleModel").value.trim();
      const imei = document.getElementById("vehicleImei").value.trim();
      const lat = Number(document.getElementById("vehicleLat").value);
      const lng = Number(document.getElementById("vehicleLng").value);
      const status = document.getElementById("vehicleStatus").value;

      if (!ownerId || !plate || !model || !imei || !lat || !lng) {
        alert("Preencha todos os campos corretamente.");
        return;
      }

      const data = getData();

      data.vehicles.push({
        id: Date.now(),
        ownerId,
        plate,
        model,
        imei,
        lat,
        lng,
        speed: Math.floor(Math.random() * 90),
        status,
        updatedAt: new Date().toLocaleString("pt-BR")
      });

      saveData(data);
      renderVehicles();
    }

    function deleteVehicle(id) {
      if (!confirm("Deseja excluir este veículo?")) return;

      const data = getData();

      data.vehicles = data.vehicles.filter(v => v.id !== id);

      saveData(data);
      renderVehicles();
    }

    function simulateVehicle(id) {
      const data = getData();

      data.vehicles = data.vehicles.map(v => {
        if (v.id === id) {
          v.lat = Number((v.lat + (Math.random() - 0.5) / 100).toFixed(6));
          v.lng = Number((v.lng + (Math.random() - 0.5) / 100).toFixed(6));
          v.speed = Math.floor(Math.random() * 100);
          v.status = Math.random() > 0.15 ? "online" : "offline";
          v.updatedAt = new Date().toLocaleString("pt-BR");
        }

        return v;
      });

      saveData(data);
      renderVehicles();
    }

    function rastrearMeuCelular() {
      if (!navigator.geolocation) {
        alert("Seu navegador não suporta localização.");
        return;
      }

      alert("Permita o acesso à localização do celular para iniciar o rastreamento.");

      watchId = navigator.geolocation.watchPosition(
        function(position) {
          const lat = Number(position.coords.latitude.toFixed(6));
          const lng = Number(position.coords.longitude.toFixed(6));

          const speed = position.coords.speed
            ? Math.round(position.coords.speed * 3.6)
            : 0;

          const data = getData();

          let plateName = "CELULAR-TESTE";

          if (currentUser.role !== "admin") {
            plateName = "CELULAR-" + currentUser.username.toUpperCase();
          }

          let meuVeiculo = data.vehicles.find(v =>
            v.plate === plateName &&
            (currentUser.role === "admin" || v.ownerId === currentUser.id)
          );

          if (!meuVeiculo) {
            meuVeiculo = {
              id: Date.now(),
              ownerId: currentUser.role === "admin" ? null : currentUser.id,
              plate: plateName,
              model: "Celular em teste",
              imei: "GPS-CELULAR",
              lat,
              lng,
              speed,
              status: "online",
              updatedAt: new Date().toLocaleString("pt-BR")
            };

            data.vehicles.push(meuVeiculo);
          } else {
            meuVeiculo.lat = lat;
            meuVeiculo.lng = lng;
            meuVeiculo.speed = speed;
            meuVeiculo.status = "online";
            meuVeiculo.updatedAt = new Date().toLocaleString("pt-BR");
          }

          saveData(data);
          renderDashboard();
        },

        function(error) {
          let mensagem = "Erro ao obter localização.";

          if (error.code === 1) {
            mensagem = "Permissão de localização negada.";
          }

          if (error.code === 2) {
            mensagem = "Localização indisponível.";
          }

          if (error.code === 3) {
            mensagem = "Tempo esgotado ao tentar obter localização.";
          }

          alert(mensagem);
        },

        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

    function pararRastreamentoCelular() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        alert("Rastreamento do celular parado.");
      } else {
        alert("Nenhum rastreamento ativo no momento.");
      }
    }

    function limparTeste() {
      if (!confirm("Limpar veículos de teste do celular?")) return;

      const data = getData();

      data.vehicles = data.vehicles.filter(v =>
        !v.plate.startsWith("CELULAR-")
      );

      saveData(data);
      renderDashboard();
    }

    window.onload = function() {
      const savedUser = localStorage.getItem("lsc_current_user");

      if (savedUser) {
        currentUser = JSON.parse(savedUser);

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";

        document.getElementById("loggedUser").innerText =
          `${currentUser.name} | ${currentUser.role.toUpperCase()}`;

        renderMenu();
        renderDashboard();
      }
    };
  </script>
</body>
</html>
