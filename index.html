<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>LSC Rastreador PRO V2</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    * {
      box-sizing: border-box;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #020617;
      color: #f8fafc;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, .35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, .22), transparent 35%),
        #020617;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: rgba(15, 23, 42, .96);
      border: 1px solid #334155;
      border-radius: 28px;
      padding: 34px;
      box-shadow: 0 30px 90px rgba(0,0,0,.65);
    }

    .logo {
      width: 78px;
      height: 78px;
      border-radius: 24px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 15px 45px rgba(56,189,248,.25);
    }

    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .brand h1 {
      margin: 0;
      color: #e0f2fe;
      font-size: 32px;
      letter-spacing: 1px;
    }

    .brand p {
      margin: 8px 0 0;
      color: #94a3b8;
      font-size: 14px;
    }

    label {
      font-size: 14px;
      color: #cbd5e1;
      display: block;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #020617;
      color: #fff;
      outline: none;
      margin-bottom: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,.12);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: white;
    }

    .btn-primary.full {
      width: 100%;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-secondary {
      background: #334155;
      color: white;
    }

    .btn-green {
      background: #22c55e !important;
      color: white;
    }

    .btn-yellow {
      background: #eab308;
      color: #111827;
    }

    .btn-small {
      padding: 8px 10px;
      font-size: 12px;
    }

    .error {
      color: #f87171;
      margin-top: 12px;
      text-align: center;
    }

    .app {
      display: none;
      min-height: 100vh;
    }

    header {
      min-height: 74px;
      background: rgba(2, 6, 23, .96);
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 999;
      backdrop-filter: blur(10px);
    }

    header h2 {
      margin: 0;
      color: #7dd3fc;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: calc(100vh - 74px);
    }

    aside {
      background: #0f172a;
      padding: 20px;
      border-right: 1px solid #1e293b;
    }

    aside button {
      width: 100%;
      margin-bottom: 10px;
      text-align: left;
      background: #1e293b;
      color: white;
    }

    aside button:hover {
      background: #334155;
    }

    .side-title {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      margin: 14px 0 10px;
      font-weight: bold;
      letter-spacing: .8px;
    }

    main {
      padding: 24px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .search {
      max-width: 390px;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 18px;
      margin-bottom: 20px;
    }

    .card {
      background: linear-gradient(180deg, #111827, #0f172a);
      border: 1px solid #334155;
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,.22);
    }

    .card h3 {
      margin: 0 0 14px;
      color: #7dd3fc;
    }

    .metric h1 {
      font-size: 38px;
      margin: 8px 0;
    }

    .metric p {
      margin: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid #334155;
      color: #cbd5e1;
      font-size: 12px;
    }

    .muted {
      color: #94a3b8;
      font-size: 13px;
    }

    .alert-box {
      background: #082f49;
      border: 1px solid #0ea5e9;
      padding: 13px;
      border-radius: 14px;
      margin-bottom: 15px;
      color: #e0f2fe;
    }

    .warning-box {
      background: #451a03;
      border: 1px solid #f59e0b;
      padding: 13px;
      border-radius: 14px;
      margin-bottom: 15px;
      color: #fef3c7;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      background: #111827;
      border-radius: 14px;
      overflow: hidden;
    }

    th, td {
      border-bottom: 1px solid #334155;
      padding: 12px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #1e293b;
      color: #93c5fd;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .status-on {
      color: #22c55e;
      font-weight: bold;
    }

    .status-off {
      color: #ef4444;
      font-weight: bold;
    }

    .status-moving {
      color: #38bdf8;
      font-weight: bold;
    }

    .status-stopped {
      color: #facc15;
      font-weight: bold;
    }

    #map {
      width: 100%;
      height: 500px;
      border-radius: 18px;
      border: 1px solid #334155;
      overflow: hidden;
    }

    .vehicle-card {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .vehicle-card h4 {
      margin: 0 0 8px;
      color: #facc15;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-content: flex-start;
      justify-content: flex-end;
    }

    .inline-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .route-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    .route-controls select {
      max-width: 260px;
      margin-bottom: 0;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 8px;
      background: #172554;
      border: 1px solid #1d4ed8;
      color: #bfdbfe;
      font-size: 12px;
    }

    @media(max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid #1e293b;
      }

      header {
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
      }

      .vehicle-card {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="brand">
        <div class="logo">📡</div>
        <h1>LSC RASTREADOR</h1>
        <p>Rastreamento, rotas, abastecimento e gestão de frota</p>
      </div>

      <label>Usuário</label>
      <input id="loginUser" placeholder="Digite seu usuário">

      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="Digite sua senha">

      <button class="btn-primary full" onclick="login()">Acessar Sistema</button>

      <div id="loginError" class="error"></div>

      <p class="muted" style="text-align:center;margin-top:18px">
        Login inicial: admin / admin
      </p>
    </div>
  </section>

  <section id="app" class="app">
    <header>
      <div>
        <h2>📡 LSC RASTREADOR PRO V2</h2>
        <span class="muted">Painel operacional de rastreamento e gestão de frota</span>
      </div>

      <div>
        <span id="loggedUser"></span>
        <button class="btn-danger btn-small" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="layout">
      <aside id="menu"></aside>

      <main>
        <section id="dashboard"></section>
      </main>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    let currentUser = null;
    let map = null;
    let markers = [];
    let routeLayer = null;
    let routeMarkers = [];
    let watchId = null;
    let routeTimer = null;
    let searchTerm = "";
    let selectedRouteVehicleId = null;
    let selectedRoutePeriod = 300;

    const routePeriods = [
      { label: "Últimos 5 minutos", seconds: 300 },
      { label: "Últimos 10 minutos", seconds: 600 },
      { label: "Últimos 30 minutos", seconds: 1800 },
      { label: "Última 1 hora", seconds: 3600 },
      { label: "Últimas 3 horas", seconds: 10800 },
      { label: "Últimas 5 horas", seconds: 18000 },
      { label: "Últimas 10 horas", seconds: 36000 },
      { label: "Último 1 dia", seconds: 86400 },
      { label: "Últimos 7 dias", seconds: 604800 },
      { label: "Últimos 15 dias", seconds: 1296000 },
      { label: "Últimos 30 dias", seconds: 2592000 },
      { label: "Últimos 90 dias", seconds: 7776000 },
      { label: "Últimos 180 dias", seconds: 15552000 },
      { label: "Últimos 360 dias", seconds: 31104000 }
    ];

    function money(value) {
      return Number(value || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatNumber(value, decimals = 2) {
      return Number(value || 0).toLocaleString("pt-BR", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }
        function getData() {
      const data = localStorage.getItem("lsc_rastreador_pro_v2");

      if (data) {
        return JSON.parse(data);
      }

      const initialData = {
        users: [
          {
            id: 1,
            name: "Administrador",
            username: "admin",
            password: "admin",
            role: "admin",
            phone: "",
            email: "",
            document: "",
            address: "",
            plan: "Premium",
            dueDate: "",
            contractStatus: "ativo"
          }
        ],

        vehicles: [
          {
            id: 1,
            ownerId: null,
            plate: "ABC-1234",
            model: "Hilux",
            year: "2023",
            color: "Prata",
            chassis: "",
            renavam: "",
            imei: "869999999999999",
            chip: "",
            carrier: "",
            lat: -8.7619,
            lng: -63.9039,
            speed: 42,
            status: "online",
            trackerStatus: "ativo",
            odometer: 128550,
            notes: "Veículo de teste",
            updatedAt: new Date().toISOString()
          }
        ],

        routes: [
          {
            id: Date.now(),
            vehicleId: 1,
            lat: -8.7619,
            lng: -63.9039,
            speed: 42,
            timestamp: new Date().toISOString()
          }
        ],

        fuelRecords: [],
        maintenanceRecords: [],
        alerts: [],
        payments: []
      };

      localStorage.setItem("lsc_rastreador_pro_v2", JSON.stringify(initialData));
      return initialData;
    }

    function saveData(data) {
      localStorage.setItem("lsc_rastreador_pro_v2", JSON.stringify(data));
    }

    function login() {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value.trim();
      const error = document.getElementById("loginError");

      const data = getData();

      const user = data.users.find(u =>
        u.username === username && u.password === password
      );

      if (!user) {
        error.innerText = "Usuário ou senha inválidos.";
        return;
      }

      currentUser = user;

      localStorage.setItem("lsc_current_user_v2", JSON.stringify(user));

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("app").style.display = "block";

      document.getElementById("loggedUser").innerText =
        `${user.name} | ${user.role.toUpperCase()}`;

      renderMenu();
      renderDashboard();
    }

    function logout() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }

      if (routeTimer !== null) {
        clearInterval(routeTimer);
      }

      localStorage.removeItem("lsc_current_user_v2");
      location.reload();
    }

    function renderMenu() {
      const menu = document.getElementById("menu");

      if (currentUser.role === "admin") {
        menu.innerHTML = `
          <div class="side-title">Rastreamento</div>
          <button onclick="renderDashboard()">📍 Dashboard Geral</button>
          <button class="btn-green" onclick="rastrearMeuCelular()">📱 Rastrear Meu Celular</button>
          <button onclick="pararRastreamentoCelular()">🛑 Parar Rastreamento</button>

          <div class="side-title">Gestão</div>
          <button onclick="renderUsers()">👤 Clientes / Usuários</button>
          <button onclick="renderVehicles()">🚗 Veículos</button>
          <button onclick="renderFuel()">⛽ Abastecimento</button>
          <button onclick="renderMaintenance()">🔧 Manutenção</button>
          <button onclick="renderFinance()">💰 Financeiro</button>

          <div class="side-title">Sistema</div>
          <button onclick="renderReports()">📊 Relatórios</button>
          <button onclick="renderAlerts()">⚠️ Alertas</button>
          <button onclick="limparTestes()">🧹 Limpar Testes</button>
        `;
      } else {
        menu.innerHTML = `
          <div class="side-title">Cliente</div>
          <button onclick="renderDashboard()">📍 Meus Veículos</button>
          <button class="btn-green" onclick="rastrearMeuCelular()">📱 Rastrear Meu Celular</button>
          <button onclick="pararRastreamentoCelular()">🛑 Parar Rastreamento</button>

          <div class="side-title">Meus Dados</div>
          <button onclick="renderFuel()">⛽ Meus Abastecimentos</button>
          <button onclick="renderMaintenance()">🔧 Minhas Manutenções</button>
          <button onclick="renderFinance()">💰 Meu Plano</button>
          <button onclick="renderReports()">📊 Meus Relatórios</button>
        `;
      }
    }

    function getAccessibleVehicles() {
      const data = getData();

      let vehicles = currentUser.role === "admin"
        ? data.vehicles
        : data.vehicles.filter(v => v.ownerId === currentUser.id);

      if (searchTerm) {
        vehicles = vehicles.filter(v =>
          `${v.plate} ${v.model} ${v.imei} ${v.chip || ""}`
            .toLowerCase()
            .includes(searchTerm.toLowerCase())
        );
      }

      return vehicles;
    }

    function getVehicleOwnerName(vehicle) {
      const data = getData();

      if (!vehicle.ownerId) {
        return "Sem cliente";
      }

      const owner = data.users.find(u => u.id === vehicle.ownerId);

      return owner ? owner.name : "Cliente não encontrado";
    }

    function relativeTime(dateString) {
      if (!dateString) return "Sem atualização";

      const diff = Math.floor((Date.now() - new Date(dateString).getTime()) / 1000);

      if (diff < 10) return "agora";
      if (diff < 60) return `há ${diff} segundos`;
      if (diff < 3600) return `há ${Math.floor(diff / 60)} minutos`;
      if (diff < 86400) return `há ${Math.floor(diff / 3600)} horas`;

      return `há ${Math.floor(diff / 86400)} dias`;
    }

    function vehicleStatusText(vehicle) {
      if (vehicle.status === "offline") {
        return `<span class="status-off">OFFLINE</span>`;
      }

      if ((vehicle.speed || 0) > 5) {
        return `<span class="status-moving">EM MOVIMENTO</span>`;
      }

      return `<span class="status-stopped">PARADO</span>`;
    }

    function getRoutePoints(vehicleId, periodSeconds) {
      const data = getData();
      const minTime = Date.now() - (periodSeconds * 1000);

      return data.routes
        .filter(r =>
          r.vehicleId === vehicleId &&
          new Date(r.timestamp).getTime() >= minTime
        )
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    }

    function addRoutePoint(vehicle) {
      const data = getData();

      data.routes.push({
        id: Date.now() + Math.random(),
        vehicleId: vehicle.id,
        lat: vehicle.lat,
        lng: vehicle.lng,
        speed: vehicle.speed || 0,
        timestamp: new Date().toISOString()
      });

      const maxTime = Date.now() - (370 * 24 * 60 * 60 * 1000);

      data.routes = data.routes.filter(r =>
        new Date(r.timestamp).getTime() >= maxTime
      );

      saveData(data);
    }

    function renderDashboard() {
      const data = getData();
      const vehicles = getAccessibleVehicles();

      const online = vehicles.filter(v => v.status === "online").length;
      const offline = vehicles.filter(v => v.status === "offline").length;

      const moving = vehicles.filter(v =>
        v.status === "online" && Number(v.speed || 0) > 5
      ).length;

      const stopped = vehicles.filter(v =>
        v.status === "online" && Number(v.speed || 0) <= 5
      ).length;

      const averageSpeed = vehicles.length
        ? Math.round(vehicles.reduce((total, v) => total + Number(v.speed || 0), 0) / vehicles.length)
        : 0;

      const accessibleIds = vehicles.map(v => v.id);

      const fuelRecords = data.fuelRecords.filter(f =>
        accessibleIds.includes(Number(f.vehicleId))
      );

      const totalFuelCost = fuelRecords.reduce((sum, f) => sum + Number(f.total || 0), 0);
      const totalLiters = fuelRecords.reduce((sum, f) => sum + Number(f.liters || 0), 0);

      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="topbar">
          <div>
            <h1 style="margin:0">Dashboard PRO V2</h1>
            <span class="muted">Rastreamento, rotas, abastecimento, frota e financeiro</span>
          </div>

          <input
            class="search"
            id="searchInput"
            placeholder="Buscar placa, modelo, IMEI ou chip"
            value="${searchTerm}"
            oninput="searchTerm=this.value;renderDashboard()"
          >
        </div>

        <div class="warning-box">
          Esta versão usa armazenamento local do navegador para teste. Para uso real com vários clientes,
          histórico longo e acesso em nuvem, será necessário banco de dados e servidor.
        </div>

        <div class="grid">
          <div class="card metric">
            <span class="pill">🚗 Frota</span>
            <h1>${vehicles.length}</h1>
            <p class="muted">Veículos neste acesso</p>
          </div>

          <div class="card metric">
            <span class="pill">🟢 Online</span>
            <h1>${online}</h1>
            <p class="muted">Transmitindo localização</p>
          </div>

          <div class="card metric">
            <span class="pill">🔴 Offline</span>
            <h1>${offline}</h1>
            <p class="muted">Sem sinal no momento</p>
          </div>

          <div class="card metric">
            <span class="pill">🏁 Movimento</span>
            <h1>${moving}</h1>
            <p class="muted">${stopped} parado(s)</p>
          </div>

          <div class="card metric">
            <span class="pill">⚡ Velocidade média</span>
            <h1>${averageSpeed}</h1>
            <p class="muted">km/h</p>
          </div>

          <div class="card metric">
            <span class="pill">⛽ Combustível</span>
            <h1>${money(totalFuelCost)}</h1>
            <p class="muted">${formatNumber(totalLiters)} litros registrados</p>
          </div>
        </div>

        <div class="card">
          <h3>Mapa de Rastreamento</h3>

          <div class="route-controls">
            <select id="routePeriod" onchange="selectedRoutePeriod=Number(this.value); if(selectedRouteVehicleId) showRoute(selectedRouteVehicleId)">
              ${routePeriods.map(p => `
                <option value="${p.seconds}" ${p.seconds === selectedRoutePeriod ? "selected" : ""}>
                  ${p.label}
                </option>
              `).join("")}
            </select>

            <button class="btn-secondary btn-small" onclick="clearRoute()">
              Limpar rota do mapa
            </button>
          </div>

          <div id="map"></div>
        </div>

        <div class="card">
          <h3>Veículos Monitorados</h3>
          <div id="vehicleList"></div>
        </div>
      `;

      renderMap(vehicles);
      renderVehicleList(vehicles);
    }

    function renderMap(vehicles) {
      setTimeout(() => {
        if (map) {
          map.remove();
        }

        map = L.map("map").setView([-8.7619, -63.9039], 12);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap"
        }).addTo(map);

        markers = [];
        routeMarkers = [];
        routeLayer = null;

        vehicles.forEach(vehicle => {
          const marker = L.marker([vehicle.lat, vehicle.lng]).addTo(map);

          marker.bindPopup(`
            <b>${vehicle.plate}</b><br>
            Modelo: ${vehicle.model}<br>
            Cliente: ${getVehicleOwnerName(vehicle)}<br>
            Status: ${vehicle.status}<br>
            Velocidade: ${vehicle.speed || 0} km/h<br>
            Atualizado: ${relativeTime(vehicle.updatedAt)}
          `);

          markers.push(marker);
        });

        if (vehicles.length > 0) {
          const group = new L.featureGroup(markers);
          map.fitBounds(group.getBounds().pad(0.2));
        }

        if (selectedRouteVehicleId) {
          showRoute(selectedRouteVehicleId, false);
        }
      }, 100);

        function clearRoute() {
      selectedRouteVehicleId = null;

      if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
      }

      routeMarkers.forEach(marker => map.removeLayer(marker));
      routeMarkers = [];
    }

    function showRoute(vehicleId, center = true) {
      selectedRouteVehicleId = Number(vehicleId);

      if (!map) return;

      if (routeLayer) {
        map.removeLayer(routeLayer);
        routeLayer = null;
      }

      routeMarkers.forEach(marker => map.removeLayer(marker));
      routeMarkers = [];

      const points = getRoutePoints(selectedRouteVehicleId, selectedRoutePeriod);

      if (points.length === 0) {
        alert("Nenhum ponto de rota encontrado para o período selecionado.");
        return;
      }

      const latlngs = points.map(p => [p.lat, p.lng]);

      routeLayer = L.polyline(latlngs, {
        color: "#38bdf8",
        weight: 5,
        opacity: 0.85
      }).addTo(map);

      const firstPoint = points[0];
      const lastPoint = points[points.length - 1];

      const startMarker = L.marker([firstPoint.lat, firstPoint.lng]).addTo(map);
      startMarker.bindPopup(`
        <b>Início da rota</b><br>
        Horário: ${new Date(firstPoint.timestamp).toLocaleString("pt-BR")}<br>
        Velocidade: ${firstPoint.speed || 0} km/h
      `);

      const endMarker = L.marker([lastPoint.lat, lastPoint.lng]).addTo(map);
      endMarker.bindPopup(`
        <b>Fim da rota</b><br>
        Horário: ${new Date(lastPoint.timestamp).toLocaleString("pt-BR")}<br>
        Velocidade: ${lastPoint.speed || 0} km/h
      `);

      routeMarkers.push(startMarker, endMarker);

      points.forEach((p, index) => {
        if (index % 5 === 0 && index !== 0 && index !== points.length - 1) {
          const pointMarker = L.circleMarker([p.lat, p.lng], {
            radius: 4,
            color: "#facc15",
            fillColor: "#facc15",
            fillOpacity: 0.7
          }).addTo(map);

          pointMarker.bindPopup(`
            <b>Ponto da rota</b><br>
            Horário: ${new Date(p.timestamp).toLocaleString("pt-BR")}<br>
            Velocidade: ${p.speed || 0} km/h
          `);

          routeMarkers.push(pointMarker);
        }
      });

      if (center) {
        const group = new L.featureGroup([routeLayer, ...routeMarkers]);
        map.fitBounds(group.getBounds().pad(0.2));
      }
    }

    function rastrearMeuCelular() {
      if (!navigator.geolocation) {
        alert("Seu navegador não suporta localização.");
        return;
      }

      alert("Permita o acesso à localização do celular. O sistema salvará pontos de rota a cada 5 segundos enquanto estiver aberto.");

      if (routeTimer !== null) {
        clearInterval(routeTimer);
      }

      watchId = navigator.geolocation.watchPosition(
        function(position) {
          const lat = Number(position.coords.latitude.toFixed(6));
          const lng = Number(position.coords.longitude.toFixed(6));

          const speed = position.coords.speed
            ? Math.round(position.coords.speed * 3.6)
            : 0;

          const data = getData();

          let plateName = "CELULAR-TESTE";

          if (currentUser.role !== "admin") {
            plateName = "CELULAR-" + currentUser.username.toUpperCase();
          }

          let vehicle = data.vehicles.find(v =>
            v.plate === plateName &&
            (currentUser.role === "admin" || v.ownerId === currentUser.id)
          );

          if (!vehicle) {
            vehicle = {
              id: Date.now(),
              ownerId: currentUser.role === "admin" ? null : currentUser.id,
              plate: plateName,
              model: "Celular em teste",
              year: "",
              color: "",
              chassis: "",
              renavam: "",
              imei: "GPS-CELULAR",
              chip: "",
              carrier: "",
              lat,
              lng,
              speed,
              status: "online",
              trackerStatus: "ativo",
              odometer: 0,
              notes: "Rastreamento de teste pelo navegador",
              updatedAt: new Date().toISOString()
            };

            data.vehicles.push(vehicle);
          } else {
            vehicle.lat = lat;
            vehicle.lng = lng;
            vehicle.speed = speed;
            vehicle.status = "online";
            vehicle.updatedAt = new Date().toISOString();
          }

          data.routes.push({
            id: Date.now() + Math.random(),
            vehicleId: vehicle.id,
            lat,
            lng,
            speed,
            timestamp: new Date().toISOString()
          });

          saveData(data);
          renderDashboard();

          if (routeTimer === null) {
            routeTimer = setInterval(() => {
              const updatedData = getData();

              const updatedVehicle = updatedData.vehicles.find(v =>
                v.plate === plateName &&
                (currentUser.role === "admin" || v.ownerId === currentUser.id)
              );

              if (updatedVehicle) {
                updatedData.routes.push({
                  id: Date.now() + Math.random(),
                  vehicleId: updatedVehicle.id,
                  lat: updatedVehicle.lat,
                  lng: updatedVehicle.lng,
                  speed: updatedVehicle.speed || 0,
                  timestamp: new Date().toISOString()
                });

                saveData(updatedData);
              }
            }, 5000);
          }
        },

        function(error) {
          let mensagem = "Erro ao obter localização.";

          if (error.code === 1) {
            mensagem = "Permissão de localização negada.";
          }

          if (error.code === 2) {
            mensagem = "Localização indisponível.";
          }

          if (error.code === 3) {
            mensagem = "Tempo esgotado ao tentar obter localização.";
          }

          alert(mensagem);
        },

        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 10000
        }
      );
    }

        clearInterval(routeTimer);
        routeTimer = null;

      alert("Rastreamento do celular parado.");

                        <td>${Number(f.km || 0).toLocaleString("pt-BR")}</td>
                        <td>
                          <button class="btn-danger btn-small" onclick="deleteFuelRecord(${f.id})">Excluir</button>
                        </td>
                      </tr>
                    `;
                  }).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("fuelDate").value = now.toISOString().slice(0,16);
    }

    function createFuelRecord() {
      const vehicleId = Number(document.getElementById("fuelVehicle").value);
      const date = document.getElementById("fuelDate").value;
      const station = document.getElementById("fuelStation").value.trim();
      const type = document.getElementById("fuelType").value;
      const km = Number(document.getElementById("fuelKm").value);
      const liters = Number(document.getElementById("fuelLiters").value);
      const pricePerLiter = Number(document.getElementById("fuelPrice").value);
      const note = document.getElementById("fuelNote").value.trim();

      if (!vehicleId || !date || !liters || !pricePerLiter) {
        alert("Preencha veículo, data, litros e valor por litro.");
        return;
      }

      const data = getData();

      const total = liters * pricePerLiter;

      data.fuelRecords.push({
        id: Date.now(),
        vehicleId,
        date: new Date(date).toISOString(),
        station,
        type,
        km,
        liters,
        pricePerLiter,
        total,
        note
      });

      data.vehicles = data.vehicles.map(v => {
        if (v.id === vehicleId && km) {
          v.odometer = km;
        }

        return v;
      });

      saveData(data);
      renderFuel();
    }

    function deleteFuelRecord(id) {
      if (!confirm("Excluir este abastecimento?")) return;

      const data = getData();

      data.fuelRecords = data.fuelRecords.filter(f => f.id !== id);

      saveData(data);
      renderFuel();
    }

    function renderMaintenance() {
      const data = getData();
      const vehicles = getAccessibleVehicles();
      const vehicleIds = vehicles.map(v => v.id);

      const records = data.maintenanceRecords
        .filter(m => vehicleIds.includes(Number(m.vehicleId)))
        .sort((a, b) => new Date(b.date) - new Date(a.date));

      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="topbar">
          <div>
            <h1 style="margin:0">Manutenção</h1>
            <span class="muted">Controle de revisão, pneus, óleo, seguro e licenciamento</span>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>Nova Manutenção</h3>

            <label>Veículo</label>
            <select id="maintenanceVehicle">
              <option value="">Selecione</option>
              ${vehicles.map(v => `<option value="${v.id}">${v.plate} - ${v.model}</option>`).join("")}
            </select>

            <label>Tipo</label>
            <select id="maintenanceType">
              <option value="Troca de óleo">Troca de óleo</option>
              <option value="Revisão">Revisão</option>
              <option value="Pneu">Pneu</option>
              <option value="Seguro">Seguro</option>
              <option value="Licenciamento">Licenciamento</option>
              <option value="Outro">Outro</option>
            </select>

            <div class="inline-row">
              <div>
                <label>Data</label>
                <input id="maintenanceDate" type="date">
              </div>

              <div>
                <label>KM</label>
                <input id="maintenanceKm" type="number" placeholder="KM atual">
              </div>
            </div>

            <div class="inline-row">
              <div>
                <label>Valor</label>
                <input id="maintenanceCost" type="number" step="0.01" placeholder="Ex: 350">
              </div>

              <div>
                <label>Próxima revisão em KM</label>
                <input id="maintenanceNextKm" type="number" placeholder="Ex: 135000">
              </div>
            </div>

            <label>Observação</label>
            <textarea id="maintenanceNote" placeholder="Descrição da manutenção"></textarea>

            <button class="btn-primary full" onclick="createMaintenanceRecord()">Salvar Manutenção</button>
          </div>

          <div class="card">
            <h3>Histórico de Manutenção</h3>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Veículo</th>
                    <th>Tipo</th>
                    <th>KM</th>
                    <th>Valor</th>
                    <th>Próximo KM</th>
                    <th>Ação</th>
                  </tr>
                </thead>

                <tbody>
                  ${records.map(m => {
                    const vehicle = data.vehicles.find(v => v.id === Number(m.vehicleId));

                    return `
                      <tr>
                        <td>${new Date(m.date).toLocaleDateString("pt-BR")}</td>
                        <td>${vehicle ? `${vehicle.plate} - ${vehicle.model}` : "Veículo removido"}</td>
                        <td>${m.type}</td>
                        <td>${Number(m.km || 0).toLocaleString("pt-BR")}</td>
                        <td>${money(m.cost)}</td>
                        <td>${Number(m.nextKm || 0).toLocaleString("pt-BR")}</td>
                        <td>
                          <button class="btn-danger btn-small" onclick="deleteMaintenanceRecord(${m.id})">Excluir</button>
                        </td>
                      </tr>
                    `;
                  }).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      document.getElementById("maintenanceDate").value = new Date().toISOString().slice(0,10);
    }

    function createMaintenanceRecord() {
      const vehicleId = Number(document.getElementById("maintenanceVehicle").value);
      const type = document.getElementById("maintenanceType").value;
      const date = document.getElementById("maintenanceDate").value;
      const km = Number(document.getElementById("maintenanceKm").value);
      const cost = Number(document.getElementById("maintenanceCost").value);
      const nextKm = Number(document.getElementById("maintenanceNextKm").value);
      const note = document.getElementById("maintenanceNote").value.trim();

      if (!vehicleId || !date || !type) {
        alert("Preencha veículo, data e tipo.");
        return;
      }

      const data = getData();

      data.maintenanceRecords.push({
        id: Date.now(),
        vehicleId,
        type,
        date,
        km,
        cost,
        nextKm,
        note
      });

      saveData(data);
      renderMaintenance();
    }

    function deleteMaintenanceRecord(id) {
      if (!confirm("Excluir manutenção?")) return;

      const data = getData();

      data.maintenanceRecords = data.maintenanceRecords.filter(m => m.id !== id);

      saveData(data);
      renderMaintenance();
    }

    function renderFinance() {
      const data = getData();
      const dashboard = document.getElementById("dashboard");

      const users = currentUser.role === "admin"
        ? data.users.filter(u => u.role === "client")
        : [currentUser];

      dashboard.innerHTML = `
        <div class="topbar">
          <div>
            <h1 style="margin:0">Financeiro</h1>
            <span class="muted">Planos, vencimentos e status do contrato</span>
          </div>
        </div>

        <div class="card">
          <h3>Clientes e Planos</h3>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Plano</th>
                  <th>Vencimento</th>
                  <th>Status</th>
                  <th>WhatsApp</th>
                </tr>
              </thead>

              <tbody>
                ${users.map(u => `
                  <tr>
                    <td>${u.name}</td>
                    <td>${u.plan || "-"}</td>
                    <td>${u.dueDate ? new Date(u.dueDate).toLocaleDateString("pt-BR") : "-"}</td>
                    <td>${u.contractStatus || "ativo"}</td>
                    <td>${u.phone || "-"}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderReports() {
      const data = getData();
      const vehicles = getAccessibleVehicles();
      const ids = vehicles.map(v => v.id);

      const fuel = data.fuelRecords.filter(f => ids.includes(Number(f.vehicleId)));
      const maintenance = data.maintenanceRecords.filter(m => ids.includes(Number(m.vehicleId)));
      const routes = data.routes.filter(r => ids.includes(Number(r.vehicleId)));

      const totalFuel = fuel.reduce((sum, f) => sum + Number(f.total || 0), 0);
      const totalMaintenance = maintenance.reduce((sum, m) => sum + Number(m.cost || 0), 0);

      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="topbar">
          <div>
            <h1 style="margin:0">Relatórios</h1>
            <span class="muted">Resumo operacional do sistema</span>
          </div>
        </div>

        <div class="grid">
          <div class="card metric">
            <span class="pill">🚗 Veículos</span>
            <h1>${vehicles.length}</h1>
            <p class="muted">No acesso atual</p>
          </div>

          <div class="card metric">
            <span class="pill">📍 Pontos de rota</span>
            <h1>${routes.length}</h1>
            <p class="muted">Histórico armazenado</p>
          </div>

          <div class="card metric">
            <span class="pill">⛽ Abastecimento</span>
            <h1>${money(totalFuel)}</h1>
            <p class="muted">${fuel.length} lançamento(s)</p>
          </div>

          <div class="card metric">
            <span class="pill">🔧 Manutenção</span>
            <h1>${money(totalMaintenance)}</h1>
            <p class="muted">${maintenance.length} lançamento(s)</p>
          </div>
        </div>

        <div class="card">
          <h3>Próximas melhorias profissionais</h3>
          <p>✅ Exportar relatório em PDF</p>
          <p>✅ Exportar CSV/Excel</p>
          <p>✅ Relatório de quilometragem por período</p>
          <p>✅ Ranking de veículos que mais gastam combustível</p>
          <p>✅ Integração com banco de dados em nuvem</p>
        </div>
      `;
    }

    function renderAlerts() {
      const data = getData();
      const vehicles = getAccessibleVehicles();

      const alerts = [];

      vehicles.forEach(v => {
        if (v.status === "offline") {
          alerts.push(`🔴 ${v.plate} está offline.`);
        }

        if (Number(v.speed || 0) > 100) {
          alerts.push(`⚠️ ${v.plate} ultrapassou 100 km/h.`);
        }
      });

      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = `
        <div class="topbar">
          <div>
            <h1 style="margin:0">Alertas</h1>
            <span class="muted">Ocorrências operacionais da frota</span>
          </div>
        </div>

        <div class="card">
          <h3>Alertas Ativos</h3>

          ${
            alerts.length
              ? alerts.map(a => `<p>${a}</p>`).join("")
              : `<p class="muted">Nenhum alerta ativo no momento.</p>`
          }
        </div>

        <div class="card">
          <h3>Alertas futuros</h3>
          <p>✅ Cerca virtual</p>
          <p>✅ Ignição ligada/desligada</p>
          <p>✅ Veículo parado por muito tempo</p>
          <p>✅ Notificação por WhatsApp</p>
        </div>
      `;
    }

    function limparTestes() {
      if (!confirm("Isso vai apagar celulares de teste e rotas de teste. Continuar?")) return;

      const data = getData();

      const testVehicleIds = data.vehicles
        .filter(v => v.plate.startsWith("CELULAR-"))
        .map(v => v.id);

      data.vehicles = data.vehicles.filter(v => !testVehicleIds.includes(v.id));
      data.routes = data.routes.filter(r => !testVehicleIds.includes(r.vehicleId));

      saveData(data);
      renderDashboard();
    }

    window.onload = function() {
      const savedUser = localStorage.getItem("lsc_current_user_v2");

      if (savedUser) {
        currentUser = JSON.parse(savedUser);

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("app").style.display = "block";

        document.getElementById("loggedUser").innerText =
          `${currentUser.name} | ${currentUser.role.toUpperCase()}`;

        renderMenu();
        renderDashboard();
      }
    };
  </script>
</body>
</html>
